name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for this workflow's GITHUB_TOKEN (read-only).
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # First-party actions pinned to major tags; SHA-pin any third-party action you add later.
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11 # match local pnpm; the repo's pnpm-workspace.yaml uses pnpm 10+ keys (onlyBuiltDependencies/allowBuilds)
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11 requires Node >= 22.13 (uses node:sqlite); project requires >= 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          # Build never connects (postgres-js is lazy); a dummy URL keeps CI hermetic.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
